name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Configure CMake
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cmake -B build -D SOLVER_VERSION="${VERSION}"

      - name: Build
        run: cmake --build build --config Release

      - name: Create binary packages (DEB, RPM)
        run: cmake --build build --target package

      - name: Create source packages (TGZ, ZIP)
        run: cmake --build build --target package_source

      - name: List generated packages
        run: ls -la build/*.{deb,rpm,tar.gz,zip} 2>/dev/null || true

      - name: Create GitHub Release and upload assets
        uses: ncipollo/release-action@v1.14.0
        with:
          artifacts: "build/*.deb,build/*.rpm,build/*.tar.gz,build/*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for version ${{ github.ref_name }}.
            Contains binary packages (DEB, RPM) and source archives (TGZ, ZIP).
          draft: false
          prerelease: false
